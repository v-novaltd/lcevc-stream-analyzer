name: Bug Report
description: Report a bug in the project
title: "[BUG] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please use this form to report a bug. Provide as much detail as possible to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Briefly describe the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the bug.
      placeholder: |
        1. Link to bitstream/ upload the bitstream after create bug in the comments
        2. Tool params required
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Observed Behavior
      description: Describe what actually happened.
      placeholder: Describe the actual behavior and attach logs if needed
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe what you expected to happen.
      placeholder: Describe the expected behavior
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Fill out the following details about your system or device:
  - type: input
    id: os_desktop
    attributes:
      label: Operating System
      description: Specify your OS (e.g., Windows, Linux, macOS).
      placeholder: e.g., Linux
  